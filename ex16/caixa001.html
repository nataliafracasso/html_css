<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box-level( Modelo de caixa ) </title>
    <style>
        h1{
            /*box-level*/
            background-color: blueviolet;
            height: 300px;
            width: 300px; 
            border-width: 10px;
            border-style: solid;
            border-color: brown; 

            padding-top: 10px; 
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

            margin-top: 10px;
            margin-right: 10px;
            margin-bottom: 110px;
            margin-left: 10px;

            outline-width: 5px;
            outline-style: dashed;
            outline-color: blueviolet;
        }
        a{
            /*box inline-level*/
            border: 10px solid blue;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-leve</h1>
    <p>Paragráfos também são exemplos de caias box- leves, mas o <a href="#">os links são exemplos de caixas inline-level</a></p>
</body>
</html>
