<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio formulário/ Media Queries</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/mediaquery.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <main>
        <section id="login">
            <div id="img">

            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente</p>
                <form action="#" method="post" autocomplete="on">
                    <div class="campo">
                        <span class="material-icons">&#xE87C;</span>
                        <input type="email" name="login" id="ilogin" required placeholder="Seu e-mail" maxlength="20" autocomplete="email">
                        <label for="ilogin">Login</label>
                    </div>
                    <div class="campo">
                        <span class="material-icons">lock</span>
                        <input type="password" name="senha" id="isenha" required placeholder="Sua senha" maxlength="20" autocomplete="current-password">
                         <label for="isenha">Senha</label>
                    </div>
                    <input type="submit" value="Entrar">
                    <a href="esquece.html" class="botao">
                        Esqueci a senha <span class="material-icons">email</span>
                    </a>
                </form>  
            </div>
        </section>
    </main>
</body>
</html>
