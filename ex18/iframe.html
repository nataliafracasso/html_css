<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo de Iframe</title>
</head>
<body>
    <h1>Testando o uso de iframe</h1>
    <p>Acesse o site do<a href="https://cursoemvideo.com" target="_blank"> Curso em Video</a> para aprender a programar</p>
    <!--Outra maneira de mostrar e direcionar outro link é criar um iframe-->
    <!--Tamanho padrão 300px de largura x 150px de altura-->
    <p>
        Acesse o site 
       <iframe src="https://cursoemvideo.com" frameborder="0" scolling="auto">
        <!--scoling configura a rolagem do iframe, podendo ser auto, yes ou no-->
        <a href="https://cursoemvideo.com"> do Curso em Vídeo</a>
       </iframe>
        para aprender a programar
    </p>
    <p>O respositório do Guanabara 
        
        <iframe src="https://gustavoguanabara.github.io" frameborder="0" width="500px" height="500px">
        <!--Nem todo naveggador tem suporte ao iframe, posso colocar conteudo aqui no meio do iframe, só vai aparcer se o dispositivo não tiver conpatibilidade com o iframe-->    
        Seu navegador não é compativel, acesse o link <a href="https://gustavoguanabara.github.io">no Github</a>
        </iframe>
    
        também é legal</p>

    
</body>
</html>
