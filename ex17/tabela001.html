<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas-alinhamentos</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{ /*largura da tabela*/
            width: 400px;
            height: 100px;
            border-collapse: collapse;/*Tira o espaço entre as bordas de dentro*/
        }
        
        td{ /*borda em cada um dos conteudos para formar uma tabela*/
            border: 1px solid black;
            padding: 8px;
            text-align: center;/*alinhamento horizontal*/
            vertical-align: top;/*funciona para alinhhamento vertical de célular de tabelas*/
        }
    </style>
</head>
<body>
    <h1>Minha primeira tabela</h1>
    <!--
        HIERARQUIA DE TABELAS(simples)
        TABLE ROW=lina de tabela
          TABLE HEADER=cabeçalho de tabela
          TABLE DATE=dado de tabela
    -->
    <table>
        <tr><!--Primeira linha--->
          <td>A1</td>  
          <td>B1</td>
          <td>C1</td>
        </tr>
    </table>
    <table>
        <tr> <!--Seggunda linha-->
            <td>A2</td><!--Conteúdo da tabela-->
            <td>B2</td>
            <td>C2</td>
        </tr>
    </table>
    <table>
        <tr><!--Terceira Linha-->
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>
    </table>
    <table>
        <tr><!--Quarta linha-->
            <td>A4</td>
            <td>B4</td>
            <td>C4</td>
        </tr>
    </table>
</body>
</html>
