<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeo</title>
</head>
<body>
    <h1>Inseriondo vídeos hospedados localmente</h1>
    <!--É preciso que o vídeo seja compativel com alguns navegadores como:MP4, WEB, ICO-->
    <video width="500" height="300" poster="vídeo/praia_jpn.jpg" controls>
 <!--Tamanho do vídeo, img de fundo, comamdo para reproduzir o vídeo-->
        <source src="vídeo/meu_video.mp4.m4v" type="video/mp4">
        <source src="vídeo/meu_vidio.ogv.ogv" type="video/ogv">
        <source src="vídeo/meu_vidio.web.mp4" type="video/web">
    </video>
    <h2>Inserindo vívdeo do YouTube</h2>
    <h1>Inseriondo vídeos do YouTube<
    <iframe width="500" height="315" src="https://www.youtube.com/embed/IGTJyeSGrzI" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
</body>
</html>
