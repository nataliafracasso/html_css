<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex-box</title>
    <style>
        body{
            padding-bottom: 500px;
        }
        .container{ /*div pai*/
            background-color: antiquewhite;
            border: 2px solid pink;
            padding: 15px;
            max-width: 300px;
            height: 300px;
            display: flex;
            /*alinhamento na horizontal*/
            justify-content: space-around;
            /*alinhamento na vertical*/
            align-items: center;
            /*para o elemento pular para a proxima linha quando a área máxima é atingida*/
            flex-wrap: wrap;
        }
        .item{
            background-color: rgb(231, 55, 84);
            border: 2px solid rgb(99, 12, 26);
            height: 50px;
            width: 50px;
        }
    </style>
</head>
<body>
    <!--Elementos sendo comandados pelo elemento "pai"-->
    <!--container (pai)-->
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
        <div class="item">7</div>
        <div class="item">8</div>
        <div class="item">9</div>
        <div class="item">10</div>
    </div>
   
</body>
</html>
