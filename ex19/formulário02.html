<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Teste de Formulário</h1>
    <form action="#" method="get" autocomplete="off">
    <p>
        <label for="inome">Aluno:</label>
        <input type="text" name="nome" id="inome" required maxlength="30" size="20" placeholder="nome completo" autocomplete="name">
    </p>
    <p>
        <label for="imedia">Média:</label>
        <input type="number" name="media" id="imedia" required min="0" max="10"
        size="20" placeholder="0 a 10" step="0.5" autocomplete="number">
    </p>
    <p>
        <label for="imes">Período letivo:</label>
        <input type="month" name="mes" id="imes" autocomplete="bday-month">
    </p>
    <p>
        <input type="submit" value="enviar">
        <input type="reset" value="limpar">
    </p>
    </form>
</body>
</html>
