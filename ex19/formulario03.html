<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Exemplo de formulario</h1>
    <form action="" method="get" autocomplete="off">
        <fieldset> <!--Grupo de campos, consigo configurar essa borda de agrupamento-->
            <legend>Dados pessoais</legend> <!--Legenda do agrupamento-->
            <p>
                <label for="inome">Nome:</label>
                <input type="text" name="nome" id="inome" minlength="5" maxlength="20" required placeholder="Digite seu nome">
            </p>
            <p>
                <label for="iemail">E-mail:</label>
                <input type="email" name="email" id="iemail" required autocomplete="email" size="20" placeholder="Digite seu e-mail">
            </p>
            <p>
                <label for="itel">Telefone:</label>
                <input type="tel" name="telefone" id="itel"  autocomplete="tel" required placeholder="(xx) xxxx-xxxx">
                <!--Estudar mais sobre RegEx. Toda expressão regular inicia com uma exclamação e termina com cifrão-->
            </p>
        </fieldset>
        <p>
            <input type="submit" value="enviar">
            <input type="reset" value="limpar">
        </p>
        </body>
    </form>
</html>
