<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Formulário</h1>
    <form action="" method="get" autocomplete="of">
        <fieldset>
            <legend>Gênero</legend>
            <input type="radio" name="sexo" id="imas" value="masculino"> <label for="imas">Masculino</label><br>
            <input type="radio" name="sexo" id="ifem"> <label for="ifem" value="Feminino">Feminino</label>
            <!--Para o input (radio) funcionar todos os input devem ter o mesmo name-->
        </fieldset>
        <fieldset>
            <legend>Esportes favoritos</legend>
            <input type="checkbox" name="esba" id="ibas"><label for="ibas">Basquete</label> <br>
            <input type="checkbox" name="esfut" id="ifut"><label for="ifut">Futebol</label><br>
            <input type="checkbox" name="estenis" id="itenis"><label for="itenis">Tenis </label><br>
            <input type="checkbox" name="esvol" id="ivol"><label for="ivol">Volei</label><br>
            <input type="checkbox" name="esnata" id="inata"><label for="inata">Natação</label><br>
        </fieldset>
        <p>
            <input type="submit" value="enviar">
            <input type="reset" value="limpar">
        </p>

    </form>
</body>
</html>
