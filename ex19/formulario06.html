<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" method="post" autocomplete="of">
        <p>
            <label for="iest">Estado:</label>
            <select name="estado" id="iest">
                <option value="">---Escolha---</option>
                <optgroup label="Brasil"> <!--AGRUPAMENTO DOS OPTION-->
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="SP">São Paulo</option>
                    <option value="RG">Rio Grande do Sul</option>
                    <option value="MG">Minas Gerais</option>
                </optgroup>
            </select>
        </p>
        <p>
            <label for="iprof">Profissão</label>
            <input type="text" name="profissão" id="iprof" list="lista">
            <datalist id="lista"><!--Além de conseguir escrever, tbm posso marcar-->
                <option value="ADM">Administrador</option> <!--Se tirar o value não aprece mais o ADM-->
                <option value="Cont">Contador</option>
                <option value="Prof">Professor</option>
                <option value="DEV">Desenvolvedor</option>
            </datalist>
        </p>
        <p>
            <label for="imen">Mensagem:</label> <br>
            <textarea name="mensagem" id="imen" cols="30" rows="10" placeholder="Sua mensagem aqui.."></textarea> <!---Para o cliente digitar mensagem. Não existe max. de linhas e colunas-->
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
