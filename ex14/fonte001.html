<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes do Google Fontes</title>
    <style>
         @import url('https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Shadows+Into+Light&display=swap');

         @import url('https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Rubik+Gemstones&family=Shadows+Into+Light&display=swap');
         
         @import url('https://fonts.googleapis.com/css2?family=Rubik+80s+Fade&display=swap');

         h1{
            font-family: 'Kaushan Script', cursive;
            font-size: 3em;
            color: blueviolet;
            
        }

        p{
            font-family: 'Rubik Gemstones', cursive; 
            font-size: 3em;
            color: blue;
         }

         h2{
            font-family: 'Rubik 80s Fade', cursive;
            font-weight: lighter;
            font-size: 3em;
            color: brown;
         }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Iusto deleniti quis provident! Natus quod voluptas iure distinctio hic, temporibus eaque ipsam nesciunt animi. Architecto molestiae a quisquam, quos minima quibusdam?</p>
    <h2>Outra fonte diferente para praticar</h2>


</body>
</html>
